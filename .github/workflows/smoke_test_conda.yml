name: Create Rubin environment from conda

on:

  # Runs this workflow automatically
  schedule:
    - cron: 55 6 * * *
    
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          # activate-environment: true
          manifest-path: src/lsdb_rubin/rsp_tests/pixi.toml

      - name: Install Rubin RSP Environment
        # shell: bash -l {0}
        run: |
          cd src/lsdb_rubin/rsp_tests
          pixi run test
          pixi add rubin-env-rsp
          pixi add -vv lsdb
          python critical_functions.py
          python random_access.py